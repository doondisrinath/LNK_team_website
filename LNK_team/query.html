<h1>Enquiry Form</h1>
<p>
        Start your dance journey with Lalitha Nrutya Kalakshetram.
        Send your enquiry and we’ll contact you soon.
      </p>
<!-- FORM -->
<form action="https://api.web3forms.com/submit" method="POST">
<input name="access_key" type="hidden" value="a92dc513-aa4f-4aed-a152-53198eec3929"/>
<!-- NAME -->
<div class="input-box">
<input name="name" placeholder="Full Name" required="" type="text"/>
</div>
<!-- EMAIL -->
<div class="input-box">
<input name="email" placeholder="Email Address" required="" type="email"/>
</div>
<!-- PHONE -->
<div class="input-box">
<input name="phone" placeholder="Phone Number" required="" type="tel"/>
</div>
<!-- COURSE -->
<div class="input-box">
<select name="course" required="">
<option value="">
              Select Course
            </option>
<option>
              Kuchipudi
            </option>
<option>
              Traditional Folk
            </option>
<option>
              Village Folk
            </option>
</select>
</div>
<!-- MODE -->
<div class="input-box">
<select name="mode" required="">
<option value="">
              Select Class Mode
            </option>
<option>
              Online
            </option>
<option>
              Offline
            </option>
</select>
</div>
<!-- QUERY -->
<div class="input-box">
<textarea name="query" placeholder="Enter Your Query"></textarea>
</div>
<!-- SUBMIT -->
<button class="submit-btn" type="submit">

          Submit Enquiry

        </button>
